name: Job Search OS Agent Run

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Command from Telegram webhook"
        required: false
        default: "run"

concurrency:
  group: job-search-os-agent
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent once
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          AGENT_COMMAND: ${{ github.event.inputs.command || 'run' }}
          GEMINI_MODEL: gemini-2.5-flash-lite
          GEMINI_FAST_MODEL: gemini-2.5-flash-lite
          GEMINI_FALLBACK_MODELS: gemini-2.0-flash-lite,gemini-2.5-flash
          GEMINI_DAILY_REQUEST_BUDGET: "18"
          MAX_LLM_SCORED_JOBS: "8"
          MAX_APPLICATIONS_PER_RUN: "2"
          MIN_APPLICATION_SCORE: "80"
        run: python main.py --once
